<!DOCTYPE html>

<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>AR Album</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<style>
body{
margin:0;
overflow:hidden;
}

#fullscreenVideo{
position:fixed;
top:0;
left:0;
width:100vw;
height:100vh;
object-fit:contain;
background:black;
display:none;
z-index:9999;
}
</style>

</head>

<body>

<video
id="fullscreenVideo"
src="./videos/Saileshpriya.mp4"
playsinline
webkit-playsinline
autoplay

> </video>

<a-scene
mindar-image="imageTargetSrc: ./targets.mind; maxTrack:1;"
color-space="sRGB"
renderer="colorManagement:true"
vr-mode-ui="enabled:false"
device-orientation-permission-ui="enabled:false"

>

<a-assets></a-assets>

<a-camera position="0 0 0" look-controls="enabled:false"></a-camera>

</a-scene>

<script>

const video = document.getElementById("fullscreenVideo");
const scene = document.querySelector("a-scene");

const TOTAL_MARKERS = 30;

function playVideo(){
video.style.display="block";
video.play().catch(()=>{});
}

function stopVideo(){
video.pause();
video.currentTime=0;
video.style.display="none";
}

for(let i=0;i<TOTAL_MARKERS;i++){

const marker=document.createElement("a-entity");

marker.setAttribute("mindar-image-target",`targetIndex:${i}`);

marker.addEventListener("targetFound",playVideo);

marker.addEventListener("targetLost",stopVideo);

scene.appendChild(marker);

}

</script>

</body>
</html>
