<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Universal AR Album</title>

<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

<script>
AFRAME.registerComponent('mytarget', {
  init: function () {

    const video = document.querySelector("#SaileshpriyaVideo");
    const target = document.querySelector("#target1");

    target.addEventListener("targetFound", () => {
      video.play();
    });

    target.addEventListener("targetLost", () => {
      video.pause();
    });

  }
});
</script>

</head>

<body>

<a-scene 
  mytarget
  mindar-image="imageTargetSrc: ./targets.mind; maxTrack: 1;" 
  color-space="sRGB"
  renderer="colorManagement: true, physicallyCorrectLights"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
>

<a-assets>
<video
id="SaileshpriyaVideo"
src="./Saileshpriya.mp4"
loop="true"
crossorigin="anonymous"
playsinline
webkit-playsinline>
</video>
</a-assets>

<a-entity id="target1" mindar-image-target="targetIndex: 0">
<a-plane
src="#SaileshpriyaVideo"
position="0 0 0"
height="0.552"
width="1"
rotation="0 0 0">
</a-plane>
</a-entity>

<a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

</a-scene>

</body>
</html>
